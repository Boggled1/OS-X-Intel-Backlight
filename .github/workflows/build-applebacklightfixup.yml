# Example:
name: Build AppleBacklightFixup and Lilu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_15.4.app/Contents/Developer || true
          sudo xcode-select --reset || true
          xcodebuild -version
          
      - name: Clone Lilu
        run: |
          git clone --depth 1 https://github.com/acidanthera/Lilu.git Lilu

      - name: Build Lilu
        run: |
          set -euo pipefail
          mkdir -p build/logs
          echo "xcodebuild: building Lilu (locating SDK via xcrun)"
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "Using SDK: $SDK_PATH"
          export SDKROOT="$SDK_PATH"
          xcodebuild -project Lilu/Lilu.xcodeproj -scheme Lilu -configuration Release \
            -sdk macosx \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            CODE_SIGNING_ALLOWED=NO \
            HEADER_SEARCH_PATHS="$SDKROOT/usr/include" \
            -derivedDataPath build \
            | tee build/logs/lilu-xcode.log

      - name: Upload Lilu logs
        uses: actions/upload-artifact@v4
        with:
          name: lilu-logs
          path: build/logs/lilu-xcode.log

      - name: Clone AppleBacklightFixup
        run: |
          git clone --depth 1 https://github.com/acidanthera/AppleBacklightFixup.git AppleBacklightFixup

      - name: Build AppleBacklightFixup
        run: |
          set -euo pipefail
          mkdir -p build/logs
          echo "xcodebuild: building AppleBacklightFixup (locating SDK via xcrun)"
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "Using SDK: $SDK_PATH"
          export SDKROOT="$SDK_PATH"
          xcodebuild -project AppleBacklightFixup/AppleBacklightFixup.xcodeproj -scheme AppleBacklightFixup -configuration Release \
            -sdk macosx \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            CODE_SIGNING_ALLOWED=NO \
            HEADER_SEARCH_PATHS="$SDKROOT/usr/include" \
            -derivedDataPath build \
            | tee build/logs/applebacklightfixup-xcode.log

      - name: Upload AppleBacklightFixup logs
        uses: actions/upload-artifact@v4
        with:
          name: applebacklightfixup-logs
          path: build/logs/applebacklightfixup-xcode.log


