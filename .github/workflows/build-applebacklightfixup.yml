# Example:
name: Build AppleBacklightFixup and Lilu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Lilu
        run: |
          git clone --depth 1 https://github.com/acidanthera/Lilu.git Lilu

      - name: Build Lilu
        run: |
          xcodebuild -project Lilu/Lilu.xcodeproj -scheme Lilu -configuration Release CODE_SIGNING_ALLOWED=NO -derivedDataPath build

      - name: Clone AppleBacklightFixup
        run: |
          git clone --depth 1 https://github.com/acidanthera/AppleBacklightFixup.git AppleBacklightFixup

      - name: Build AppleBacklightFixup
        run: |
          xcodebuild -project AppleBacklightFixup/AppleBacklightFixup.xcodeproj -scheme AppleBacklightFixup -configuration Release CODE_SIGNING_ALLOWED=NO -derivedDataPath build
