# Paste the workflow YAML here exactly as you want it.
# Example:
name: Build AppleBacklightFixup and Lilu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Lilu
        run: |
          git clone --depth 1 https://github.com/acidanthera/Lilu.git Lilu

      - name: Build Lilu
        run: |
          set -euo pipefail
          SDKPATH=$(xcrun --sdk macosx --show-sdk-path)
          echo "Using SDK: $SDKPATH"
          mkdir -p build/logs
          xcodebuild -project Lilu/Lilu.xcodeproj -scheme Lilu -configuration Release \
            SDKROOT="$SDKPATH" MACOSX_DEPLOYMENT_TARGET=10.13 \
            CODE_SIGNING_ALLOWED=NO -derivedDataPath build \
            | tee build/logs/lilu-xcode.log

      - name: Upload Lilu logs
        uses: actions/upload-artifact@v4
        with:
          name: lilu-logs
          path: build/logs/lilu-xcode.log

      - name: Clone AppleBacklightFixup
        run: |
          git clone --depth 1 https://github.com/acidanthera/AppleBacklightFixup.git AppleBacklightFixup

      - name: Build AppleBacklightFixup
        run: |
          set -euo pipefail
          SDKPATH=$(xcrun --sdk macosx --show-sdk-path)
          echo "Using SDK: $SDKPATH"
          mkdir -p build/logs
          xcodebuild -project AppleBacklightFixup/AppleBacklightFixup.xcodeproj -scheme AppleBacklightFixup -configuration Release \
            SDKROOT="$SDKPATH" MACOSX_DEPLOYMENT_TARGET=10.13 \
            CODE_SIGNING_ALLOWED=NO -derivedDataPath build \
            | tee build/logs/applebacklightfixup-xcode.log

      - name: Upload AppleBacklightFixup logs
        uses: actions/upload-artifact@v4
        with:
          name: applebacklightfixup-logs
          path: build/logs/applebacklightfixup-xcode.log

